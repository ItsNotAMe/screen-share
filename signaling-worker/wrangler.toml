name = "screenshare-signaling"
main = "src/index.ts"
compatibility_date = "2026-05-21"

[[kv_namespaces]]
binding = "ROOMS"
id = "ab4659f75bf04b1eb097c5b688094bae"

[[durable_objects.bindings]]
name = "ROOM_OBJECTS"
class_name = "RoomObject"

[[durable_objects.bindings]]
name = "ROOM_DIRECTORY"
class_name = "RoomDirectoryObject"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterObject"

# Optional: comma-separated browser origins allowed for CORS. Leave unset so no
# CORS headers are emitted (native clients are unaffected; browsers are blocked
# by default). Set only if a browser client actually needs cross-origin access,
# e.g. ALLOWED_ORIGINS = "https://app.example.com".
# [vars]
# ALLOWED_ORIGINS = ""

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RoomDirectoryObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["RateLimiterObject"]
